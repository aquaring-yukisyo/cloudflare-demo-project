name = "cloudflare-demo-project"
main = "src/index.ts"
compatibility_date = "2024-01-15"

# Worker configuration
workers_dev = true
account_id = "441173fa8f21b10fb5747318e0da4e75"  # Add your Cloudflare account ID here

# Build configuration
# Wrangler handles TypeScript compilation automatically

# Environment variables
[vars]
ENVIRONMENT = "production"
API_VERSION = "1.0.0"

# KV Namespace binding
[[kv_namespaces]]
binding = "DEMO_KV"
id = "5c110994b08449c7b4848b517424a93f"
preview_id = "16da743a216a4bc980000b4fcc6ad6f3"

# D1 Database binding
[[d1_databases]]
binding = "DEMO_DB"
database_name = "demo-database"
database_id = "68efc972-6973-4caf-96ff-a603a9938e2e"

# R2 Bucket binding
[[r2_buckets]]
binding = "DEMO_BUCKET"
bucket_name = "demo-bucket"
preview_bucket_name = "demo-bucket-preview"

# Development environment configuration
[env.development]
name = "cloudflare-demo-project-dev"
vars = { ENVIRONMENT = "development" }

[[env.development.kv_namespaces]]
binding = "DEMO_KV"
id = "your-dev-kv-namespace-id"
preview_id = "your-dev-preview-kv-namespace-id"

[[env.development.d1_databases]]
binding = "DEMO_DB"
database_name = "demo-database-dev"
database_id = "your-dev-d1-database-id"

[[env.development.r2_buckets]]
binding = "DEMO_BUCKET"
bucket_name = "demo-bucket-dev"
preview_bucket_name = "demo-bucket-dev-preview"

# Staging environment configuration
[env.staging]
name = "cloudflare-demo-project-staging"
vars = { ENVIRONMENT = "staging" }

[[env.staging.kv_namespaces]]
binding = "DEMO_KV"
id = "your-staging-kv-namespace-id"
preview_id = "your-staging-preview-kv-namespace-id"

[[env.staging.d1_databases]]
binding = "DEMO_DB"
database_name = "demo-database-staging"
database_id = "your-staging-d1-database-id"

[[env.staging.r2_buckets]]
binding = "DEMO_BUCKET"
bucket_name = "demo-bucket-staging"
preview_bucket_name = "demo-bucket-staging-preview"

# Deployment configuration
[triggers]
crons = []  # Add cron triggers if needed

# Observability
[observability]
enabled = true
